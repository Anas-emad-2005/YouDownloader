<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDownloader - أنس عماد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-5">
    <div class="card main-box shadow p-4 mb-4">
        <h1 class="mb-4 text-white fw-bold"><i class="fab fa-youtube text-danger"></i> YouDownloader</h1>
        
        <div class="search-container mb-4">
            <input type="text" id="videoUrl" class="form-control mb-3 custom-placeholder" placeholder="ضع رابط الفيديو هنا...">
            <button class="btn btn-danger w-100 fw-bold py-2" id="btnFetch">
                <i class="fas fa-search"></i> فحص الرابط ومسح البيانات
            </button>
        </div>

        <div id="loader" class="d-none my-4">
            <div class="spinner-border text-danger"></div>
            <p class="mt-2 text-white">جاري استخراج الجودات المتاحة...</p>
        </div>

        <div id="resultArea" class="d-none w-100">
            <img id="videoThumb" src="" class="img-fluid rounded shadow mb-3 border border-secondary">
            <h5 id="videoTitle" class="mb-4 text-white fw-bold"></h5>

            <div class="options-panel text-end p-4 rounded mb-3">
                <p class="text-white fw-bold mb-3"><i class="fas fa-music text-danger"></i> نوع الملف:</p>
                <div class="form-check form-switch mb-4">
                    <input class="form-check-input shadow-none" type="checkbox" id="audioOnly">
                    <label class="form-check-label text-white ms-2" for="audioOnly">تنزيل صوت فقط (MP3/M4A)</label>
                </div>

                <p class="text-white fw-bold mb-3"><i class="fas fa-layer-group text-danger"></i> اختر الجودة المطلوبة:</p>
                <div id="qualityOptions" class="mb-4">
                    </div>

                <button class="btn btn-success w-100 py-3 fw-bold fs-5" id="btnDownload">
                    <i class="fas fa-download"></i> بدء التحميل 
                </button>
            </div>
        </div>
        
        <div class="disclaimer mt-3 text-center">
            <small class="text-secondary text-white-50">
                ملاحظة: أبرأ إلى الله من أي استخدام غير مشروع للموقع في تحميل مقاطع محرمة أو موسيقى.
            </small>
        </div>
    </div>

    <footer class="footer-bar text-center">
        <p class="m-0 text-white-50">جميع الحقوق محفوظة © أنس عماد عبد الله | 2026</p>
    </footer>
</div>

<script src="main.js"></script>
</body>
</html>
